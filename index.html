<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akshani's A/L Exam Tracker 🌸</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">

    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    
    <div class="app-container">
        <!-- Header -->
        <header class="glass-panel main-header">
            <h1>You've Got This, <span class="highlight">Akshani!</span> 🎓</h1>
            <p>Your 35-Day Journey to A/L Success</p>
        </header>

        <div class="content-wrapper">
            <!-- Left Column: Progress & Stats -->
            <aside class="sidebar glass-panel">
                <div class="chart-container">
                    <canvas id="progressChart"></canvas>
                    <div class="chart-center-text" id="chartCenterText">0%</div>
                </div>
                <div class="stats">
                    <div class="stat-box">
                        <span class="stat-val" id="completedCount">0</span>
                        <span class="stat-label">Days Done</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-val" id="remainingCount">35</span>
                        <span class="stat-label">To Go</span>
                    </div>
                </div>

                <!-- Countdown Timer -->
                <div class="countdown-container">
                    <h3>Time Until Exam ⏳</h3>
                    <div class="countdown-timer" id="countdownTimer">
                        <div class="time-box">
                            <span class="time-val" id="cd-days">00</span>
                            <span class="time-label">Days</span>
                        </div>
                        <div class="time-box">
                            <span class="time-val" id="cd-hours">00</span>
                            <span class="time-label">Hrs</span>
                        </div>
                        <div class="time-box">
                            <span class="time-val" id="cd-mins">00</span>
                            <span class="time-label">Mins</span>
                        </div>
                        <div class="time-box">
                            <span class="time-val" id="cd-secs">00</span>
                            <span class="time-label">Secs</span>
                        </div>
                    </div>
                </div>
                
                <div style="margin-top: 0.5rem; text-align: center;">
                    <a href="admin.html" class="admin-link">🔒 Admin Login</a>
                </div>
            </aside>

            <!-- Right Column: Timetable Cards -->
            <main class="timetable-main">
                <section class="task-section">
                    <h2 class="section-title">Today's Plan 🎯</h2>
                    <div id="todayList" class="timetable-list"></div>
                </section>
                
                <section class="task-section">
                    <h2 class="section-title" style="margin-top: 2rem;">Upcoming 📅</h2>
                    <div id="pendingList" class="timetable-list"></div>
                </section>
            </main>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast">Well done Manika! 🎉</div>

    <script src="timetableData.js"></script>
    <script src="db.js"></script>
    <script src="app.js"></script>
</body>
</html>
